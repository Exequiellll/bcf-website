<svg width="200" height="240" viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield shape with gold border -->
  <path d="M 100 10 L 180 50 L 180 150 L 100 190 L 20 150 L 20 50 Z" fill="url(#goldGradient)" stroke="#d97706" stroke-width="3"/>
  
  <!-- Blue inner shield -->
  <path d="M 100 18 L 172 54 L 172 146 L 100 182 L 28 146 L 28 54 Z" fill="url(#blueGradient)"/>
  
  <!-- Radiating light rays from bottom center -->
  <g opacity="0.4" stroke="#60a5fa" stroke-width="2" stroke-linecap="round">
    <line x1="100" y1="190" x2="100" y2="160"/>
    <line x1="100" y1="190" x2="85" y2="170"/>
    <line x1="100" y1="190" x2="115" y2="170"/>
    <line x1="100" y1="190" x2="70" y2="150"/>
    <line x1="100" y1="190" x2="130" y2="150"/>
    <line x1="100" y1="190" x2="60" y2="130"/>
    <line x1="100" y1="190" x2="140" y2="130"/>
  </g>
  
  <!-- Six yellow stars -->
  <g fill="#fbbf24">
    <!-- Left side stars (3) -->
    <path d="M 50 70 L 52 76 L 58 76 L 53 80 L 55 86 L 50 82 L 45 86 L 47 80 L 42 76 L 48 76 Z"/>
    <path d="M 50 90 L 52 96 L 58 96 L 53 100 L 55 106 L 50 102 L 45 106 L 47 100 L 42 96 L 48 96 Z"/>
    <path d="M 50 110 L 52 116 L 58 116 L 53 120 L 55 126 L 50 122 L 45 126 L 47 120 L 42 116 L 48 116 Z"/>
    <!-- Right side stars (3) -->
    <path d="M 150 70 L 152 76 L 158 76 L 153 80 L 155 86 L 150 82 L 145 86 L 147 80 L 142 76 L 148 76 Z"/>
    <path d="M 150 90 L 152 96 L 158 96 L 153 100 L 155 106 L 150 102 L 145 106 L 147 100 L 142 96 L 148 96 Z"/>
    <path d="M 150 110 L 152 116 L 158 116 L 153 120 L 155 126 L 150 122 L 145 126 L 147 120 L 142 116 L 148 116 Z"/>
  </g>
  
  <!-- Open Book at bottom -->
  <rect x="60" y="150" width="80" height="30" fill="#78350f" rx="2"/>
  <rect x="65" y="155" width="70" height="20" fill="#ffffff" rx="1"/>
  <line x1="65" y1="160" x2="135" y2="160" stroke="#e5e7eb" stroke-width="0.5"/>
  <line x1="65" y1="165" x2="135" y2="165" stroke="#e5e7eb" stroke-width="0.5"/>
  <line x1="65" y1="170" x2="135" y2="170" stroke="#e5e7eb" stroke-width="0.5"/>
  <line x1="100" y1="155" x2="100" y2="175" stroke="#78350f" stroke-width="1.5"/>
  
  <!-- Three Figures standing on book -->
  <g fill="#ffffff">
    <!-- Left figure (smaller) -->
    <circle cx="75" cy="130" r="7"/>
    <rect x="71" y="137" width="8" height="12" rx="1.5"/>
    
    <!-- Center figure (larger) -->
    <circle cx="100" cy="120" r="9"/>
    <rect x="94" y="129" width="12" height="18" rx="2"/>
    
    <!-- Right figure (smaller) -->
    <circle cx="125" cy="130" r="7"/>
    <rect x="121" y="137" width="8" height="12" rx="1.5"/>
  </g>
  
  <!-- Text: BCF CHURCH -->
  <text x="100" y="200" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">BCF CHURCH</text>
  
  <!-- Text: 2011 -->
  <text x="100" y="215" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">2011</text>
</svg>
